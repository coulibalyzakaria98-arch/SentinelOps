version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: sentinelops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinelops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelops-network

  redis:
    image: redis:7-alpine
    container_name: sentinelops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinelops-network

  backend:
    build: ./backend
    container_name: sentinelops-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sentinelops
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - sentinelops-network

  frontend:
    build: ./frontend
    container_name: sentinelops-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - sentinelops-network

  nginx:
    image: nginx:alpine
    container_name: sentinelops-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - sentinelops-network

networks:
  sentinelops-network:
    driver: bridge

volumes:
  postgres_data:
