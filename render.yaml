# SentinelOps - Render Deployment Configuration
# https://render.com/docs/infrastructure-as-code

services:
  # Backend API
  - type: web
    name: sentinelops-api
    runtime: python
    repo: https://github.com/votre-username/sentinelops
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinelops-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
    
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # Database
  - type: postgresql
    name: sentinelops-db
    plan: free
    ipAllowList: []
    databaseName: sentinelops
    postgresMajorVersion: 15
